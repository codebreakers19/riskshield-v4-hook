[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib", "../v4-core"]
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true

[rpc_endpoints]
unichain_sepolia = "${UNICHAIN_SEPOLIA_RPC_URL}"

[etherscan]
unichain_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 1301 }
